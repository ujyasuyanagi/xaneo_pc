name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: xaneo_pc
  APP_VERSION: ${{ github.ref_name }}
  FLUTTER_VERSION: '3.32.2'
  FLUTTER_CHANNEL: 'stable'

jobs:

# ═══════════════════════════════════════════════════════════
#  WINDOWS — .exe (zip архив)
# ═══════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows build
        run: |
          $src = "build\windows\x64\runner\Release"
          $out = "dist\xaneo_pc-${{ env.APP_VERSION }}-windows-x64.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$src\*" -DestinationPath $out
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/xaneo_pc-${{ env.APP_VERSION }}-windows-x64.zip
          retention-days: 7


# ═══════════════════════════════════════════════════════════
#  LINUX — .deb  .rpm  .tar.gz
# ═══════════════════════════════════════════════════════════
  build-linux:
    name: 🐧 Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build clang pkg-config \
            libgtk-3-dev libglib2.0-dev \
            libblkid-dev liblzma-dev \
            rpm dpkg-dev fakeroot

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Prepare dist dir
        run: mkdir -p dist

      - name: Build .tar.gz
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          VERSION="${{ env.APP_VERSION }}"
          tar -czf "dist/${APP_NAME}-${VERSION}-linux-x64.tar.gz" -C "$BUNDLE" .
        env:
          APP_NAME: ${{ env.APP_NAME }}

      - name: Build .deb package
        run: |
          VERSION="${{ env.APP_VERSION }}"
          VERSION="${VERSION#v}"
          BUNDLE="build/linux/x64/release/bundle"
          PKG="dist/deb-build"

          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/opt/xaneo-pc"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$PKG/usr/bin"

          cp -r "$BUNDLE"/. "$PKG/opt/xaneo-pc/"

          printf '[Desktop Entry]\nType=Application\nName=Xaneo PC\nComment=Desktop application with onboarding\nExec=/opt/xaneo-pc/xaneo_pc_new\nIcon=xaneo_pc\nCategories=Utility;\n' \
            > "$PKG/usr/share/applications/xaneo_pc.desktop"

          if [ -f "AppDir/xaneo_pc.png" ]; then
            cp AppDir/xaneo_pc.png "$PKG/usr/share/icons/hicolor/256x256/apps/"
          fi

          ln -sf /opt/xaneo-pc/xaneo_pc_new "$PKG/usr/bin/xaneo-pc"

          INSTALLED_SIZE=$(du -sk "$PKG/opt/xaneo-pc" | cut -f1)

          cat > "$PKG/DEBIAN/control" <<CONTROL
Package: xaneo-pc
Version: $VERSION
Architecture: amd64
Maintainer: Xaneo <info@xaneo.com>
Installed-Size: $INSTALLED_SIZE
Depends: libgtk-3-0, libglib2.0-0
Section: utils
Priority: optional
Homepage: https://xaneo.com
Description: Xaneo PC - Desktop application with onboarding
 Xaneo PC is a desktop application with onboarding features.
CONTROL

          cat > "$PKG/DEBIAN/postinst" <<'POSTINST'
#!/bin/bash
update-desktop-database /usr/share/applications || true
gtk-update-icon-cache /usr/share/icons/hicolor || true
POSTINST
          chmod 755 "$PKG/DEBIAN/postinst"

          fakeroot dpkg-deb --build "$PKG" "dist/xaneo_pc_${VERSION}_amd64.deb"

      - name: Build .rpm package
        run: |
          VERSION="${{ env.APP_VERSION }}"
          VERSION="${VERSION#v}"
          BUNDLE="build/linux/x64/release/bundle"

          RPM_ROOT="$HOME/rpmbuild"
          mkdir -p "$RPM_ROOT"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          BUILDROOT="$RPM_ROOT/BUILDROOT/xaneo-pc-${VERSION}-1.x86_64"
          mkdir -p "$BUILDROOT/opt/xaneo-pc"
          mkdir -p "$BUILDROOT/usr/share/applications"
          mkdir -p "$BUILDROOT/usr/bin"

          cp -r "$BUNDLE"/. "$BUILDROOT/opt/xaneo-pc/"

          printf '[Desktop Entry]\nType=Application\nName=Xaneo PC\nComment=Desktop application with onboarding\nExec=/opt/xaneo-pc/xaneo_pc_new\nIcon=xaneo_pc\nCategories=Utility;\n' \
            > "$BUILDROOT/usr/share/applications/xaneo_pc.desktop"

          ln -sf /opt/xaneo-pc/xaneo_pc_new "$BUILDROOT/usr/bin/xaneo-pc"

          DATE=$(date +'%a %b %d %Y')

          cat > "$RPM_ROOT/SPECS/xaneo-pc.spec" <<SPEC
Name:           xaneo-pc
Version:        $VERSION
Release:        1%{?dist}
Summary:        Xaneo PC - Desktop application with onboarding
License:        Proprietary
URL:            https://xaneo.com
BuildArch:      x86_64

Requires:       gtk3, glib2

%description
Xaneo PC is a desktop application with onboarding features.

%files
/opt/xaneo-pc/
/usr/share/applications/xaneo_pc.desktop
/usr/bin/xaneo-pc

%post
update-desktop-database /usr/share/applications || true

%changelog
* $DATE CI Build <ci@xaneo.com> - $VERSION-1
- Automated build
SPEC

          rpmbuild -bb \
            --define "_topdir $RPM_ROOT" \
            --buildroot "$BUILDROOT" \
            "$RPM_ROOT/SPECS/xaneo-pc.spec"

          RPM_FILE=$(find "$RPM_ROOT/RPMS/x86_64" -name "*.rpm" | head -1)
          cp "$RPM_FILE" "dist/xaneo_pc-${VERSION}-1.x86_64.rpm"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          retention-days: 7


# ═══════════════════════════════════════════════════════════
#  MACOS — .dmg
# ═══════════════════════════════════════════════════════════
  build-macos:
    name: 🍎 macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create .dmg
        run: |
          APP_PATH="build/macos/Build/Products/Release/xaneo_pc.app"
          VERSION="${{ env.APP_VERSION }}"
          mkdir -p dist
          hdiutil create \
            -volname "Xaneo PC" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "dist/xaneo_pc-${VERSION}-macos.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/xaneo_pc-${{ env.APP_VERSION }}-macos.dmg
          retention-days: 7


# ═══════════════════════════════════════════════════════════
#  RELEASE — создаём GitHub Release со всеми артефактами
# ═══════════════════════════════════════════════════════════
  release:
    name: 📦 GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Xaneo PC ${{ env.APP_VERSION }}"
          draft: false
          prerelease: ${{ contains(env.APP_VERSION, 'alpha') || contains(env.APP_VERSION, 'beta') || contains(env.APP_VERSION, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
