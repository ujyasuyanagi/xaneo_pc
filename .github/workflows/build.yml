name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: xaneo_pc
  FLUTTER_VERSION: '3.32.2'
  FLUTTER_CHANNEL: 'stable'

jobs:

# ==========================================================
#  WINDOWS — zip архив с .exe
# ==========================================================
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Bundle VC++ Redistributable
        shell: pwsh
        run: |
          $ReleaseDir = "build\windows\x64\runner\Release"
          Copy-Item "C:\Windows\System32\msvcp140.dll" -Destination $ReleaseDir
          Copy-Item "C:\Windows\System32\vcruntime140.dll" -Destination $ReleaseDir
          Copy-Item "C:\Windows\System32\vcruntime140_1.dll" -Destination $ReleaseDir

      - name: Archive Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "dist\xaneo_pc-${{ github.ref_name }}-windows-x64.zip"

      - name: Build Windows Installer (InnoSetup)
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          if ([string]::IsNullOrWhiteSpace($Version) -or $Version -eq "main") { $Version = "1.0.0" }
          
          $issContent = @"
          [Setup]
          AppName=Xaneo PC
          AppVersion=$Version
          DefaultDirName={autopf}\Xaneo PC
          DefaultGroupName=Xaneo PC
          OutputDir=dist
          OutputBaseFilename=xaneo_pc-${{ github.ref_name }}-windows-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          DisableWelcomePage=no
          WizardStyle=modern

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Xaneo PC"; Filename: "{app}\xaneo_pc.exe"
          Name: "{autodesktop}\Xaneo PC"; Filename: "{app}\xaneo_pc.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          "@
          
          Out-File -FilePath "setup.iss" -InputObject $issContent -Encoding UTF8
          iscc setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/*.zip
            dist/*.exe
          retention-days: 7


# ==========================================================
#  LINUX — .tar.gz  .deb  .rpm
# ==========================================================
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build clang pkg-config \
            libgtk-3-dev libglib2.0-dev \
            libblkid-dev liblzma-dev \
            rpm dpkg-dev fakeroot

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - run: mkdir -p dist

      - name: Build tar.gz
        run: |
          tar -czf "dist/xaneo_pc-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .

      - name: Build deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0-${VERSION}"; fi
          BUNDLE="build/linux/x64/release/bundle"
          PKG="dist/deb-build"

          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/opt/xaneo-pc"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$PKG/usr/bin"

          cp -r "$BUNDLE"/. "$PKG/opt/xaneo-pc/"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=Xaneo PC' \
            'Comment=Desktop application with onboarding' \
            'Exec=/opt/xaneo-pc/xaneo_pc_new' \
            'Icon=xaneo_pc' \
            'Categories=Utility;' \
            > "$PKG/usr/share/applications/xaneo_pc.desktop"

          if [ -f "AppDir/xaneo_pc.png" ]; then
            cp AppDir/xaneo_pc.png "$PKG/usr/share/icons/hicolor/256x256/apps/"
          fi

          ln -sf /opt/xaneo-pc/xaneo_pc_new "$PKG/usr/bin/xaneo-pc"

          INSTALLED_SIZE=$(du -sk "$PKG/opt/xaneo-pc" | cut -f1)

          python3 - <<PYEOF
          import os, textwrap
          version = os.environ.get('VERSION', '$VERSION')
          size    = os.environ.get('INSTALLED_SIZE', '$INSTALLED_SIZE')
          pkg     = os.environ.get('PKG', '$PKG')
          control = textwrap.dedent(f"""
              Package: xaneo-pc
              Version: {version}
              Architecture: amd64
              Maintainer: Xaneo <info@xaneo.com>
              Installed-Size: {size}
              Depends: libgtk-3-0, libglib2.0-0
              Section: utils
              Priority: optional
              Homepage: https://xaneo.com
              Description: Xaneo PC - Desktop application with onboarding
               Xaneo PC is a desktop application with onboarding features.
          """).lstrip()
          open(f"{pkg}/DEBIAN/control", "w").write(control)
          postinst = "#!/bin/bash\nupdate-desktop-database /usr/share/applications || true\ngtk-update-icon-cache /usr/share/icons/hicolor || true\n"
          open(f"{pkg}/DEBIAN/postinst", "w").write(postinst)
          os.chmod(f"{pkg}/DEBIAN/postinst", 0o755)
          PYEOF

          fakeroot dpkg-deb --build "$PKG" "dist/xaneo_pc_${VERSION}_amd64.deb"

      - name: Build rpm
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0_${VERSION}"; fi
          VERSION="${VERSION//-/_}"
          BUNDLE="build/linux/x64/release/bundle"
          RPM_ROOT="$HOME/rpmbuild"

          mkdir -p "$RPM_ROOT"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          BUILDROOT="$RPM_ROOT/BUILDROOT/xaneo-pc-${VERSION}-1.x86_64"
          mkdir -p "$BUILDROOT/opt/xaneo-pc"
          mkdir -p "$BUILDROOT/usr/share/applications"
          mkdir -p "$BUILDROOT/usr/bin"

          cp -r "$BUNDLE"/. "$BUILDROOT/opt/xaneo-pc/"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=Xaneo PC' \
            'Comment=Desktop application with onboarding' \
            'Exec=/opt/xaneo-pc/xaneo_pc_new' \
            'Icon=xaneo_pc' \
            'Categories=Utility;' \
            > "$BUILDROOT/usr/share/applications/xaneo_pc.desktop"

          ln -sf /opt/xaneo-pc/xaneo_pc_new "$BUILDROOT/usr/bin/xaneo-pc"

          DATE=$(date +'%a %b %d %Y')

          python3 - <<PYEOF
          import os
          version   = '$VERSION'
          date      = '$DATE'
          rpm_root  = '$RPM_ROOT'
          buildroot = '$BUILDROOT'
          spec = f"""Name:           xaneo-pc
          Version:        {version}
          Release:        1%{{?dist}}
          Summary:        Xaneo PC - Desktop application with onboarding
          License:        Proprietary
          URL:            https://xaneo.com
          BuildArch:      x86_64

          Requires:       gtk3, glib2

          %description
          Xaneo PC is a desktop application with onboarding features.

          %files
          /opt/xaneo-pc/
          /usr/share/applications/xaneo_pc.desktop
          /usr/bin/xaneo-pc

          %post
          update-desktop-database /usr/share/applications || true

          %changelog
          * {date} CI Build <ci@xaneo.com> - {version}-1
          - Automated build
          """
          open(f"{rpm_root}/SPECS/xaneo-pc.spec", "w").write(spec)
          PYEOF

          rpmbuild -bb \
            --define "_topdir $RPM_ROOT" \
            --buildroot "$BUILDROOT" \
            "$RPM_ROOT/SPECS/xaneo-pc.spec"

          RPM_FILE=$(find "$RPM_ROOT/RPMS/x86_64" -name "*.rpm" | head -1)
          cp "$RPM_FILE" "dist/xaneo_pc-${VERSION}-1.x86_64.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          retention-days: 7


# ==========================================================
#  MACOS — .dmg
# ==========================================================
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create dmg
        run: |
          mkdir -p dist
          hdiutil create \
            -volname "Xaneo PC" \
            -srcfolder "build/macos/Build/Products/Release/xaneo_pc.app" \
            -ov -format UDZO \
            "dist/xaneo_pc-${{ github.ref_name }}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/xaneo_pc-${{ github.ref_name }}-macos.dmg
          retention-days: 7


# ==========================================================
#  RELEASE — публикуем GitHub Release
# ==========================================================
  release:
    name: GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-build' }}
          name: "Xaneo PC ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
